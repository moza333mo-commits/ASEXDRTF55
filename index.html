<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة مراقبة المعمل</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; border-radius: 24px; padding: 50px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid #334155; width: 350px; }
        .title { font-size: 20px; color: #94a3b8; margin-bottom: 10px; }
        .number { font-size: 140px; font-weight: 800; color: #38bdf8; line-height: 1; margin: 20px 0; text-shadow: 0 0 30px rgba(56, 189, 248, 0.3); }
        .date-box { background: #334155; padding: 10px; border-radius: 12px; font-size: 16px; color: #f1f5f9; }
        .update-tag { margin-top: 25px; font-size: 12px; color: #64748b; }
        .dot { height: 10px; width: 10px; background-color: #22c55e; border-radius: 50%; display: inline-block; margin-left: 8px; animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">العمال داخل المعمل الآن</div>
        <div id="count" class="number">0</div>
        <div id="date" class="date-box">جاري التحقق...</div>
        <div class="update-tag">
            <span class="dot"></span>
            <span id="lastUpdate">تحديث تلقائي كل دقيقة</span>
        </div>
    </div>

    <script>
        // هذا هو الرابط المباشر للبيانات (CSV) المستخرج من ملفك
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT3yXQeG2iF3L8yvA6N-I7A3I0P0X5I0X5I0X5I0X5I0X5I0X5I0X5I0X5I0X5I0/pub?gid=196803144&output=csv';

        async function fetchWorkers() {
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                const rows = data.split('\n').map(row => row.split(','));

                // تاريخ اليوم بنفس تنسيق ملفك (اليوم/الشهر/السنة)
                const now = new Date();
                const day = String(now.getDate()).padStart(2, '0');
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const year = now.getFullYear();
                const todayStr = `${day}/${month}/${year}`;
                
                document.getElementById('date').innerText = "تاريخ اليوم: " + todayStr;

                let count = 0;
                // نبدأ من 1 لتخطي سطر العنوان
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (row.length < 9) continue;

                    const rowDate = row[1]; // عمود B
                    const entry = row[7];   // عمود H
                    const exit = row[8];    // عمود I

                    // الفلتر: نفس التاريخ + بصمة دخول + لا يوجد بصمة خروج
                    if (rowDate && rowDate.includes(todayStr)) {
                        if (entry && entry.trim() !== "" && (!exit || exit.trim() === "")) {
                            count++;
                        }
                    }
                }
                document.getElementById('count').innerText = count;
                document.getElementById('lastUpdate').innerText = "آخر تحديث: " + new Date().toLocaleTimeString();
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('lastUpdate').innerText = "فشل في جلب البيانات";
            }
        }

        // تحديث كل 60 ثانية
        setInterval(fetchWorkers, 60000);
        fetchWorkers();
    </script>
</body>
</html>
