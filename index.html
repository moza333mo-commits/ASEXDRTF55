<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة التحكم | الرصيد المباشر</title>
  <style>
    body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .card { background: #1e293b; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #334155; width: 350px; }
    .balance { font-size: 3.5rem; color: #10b981; margin: 20px 0; font-weight: bold; }
    .time { color: #64748b; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="card">
    <div>رصيد الصندوق الحالي</div>
    <div class="balance" id="val">--.--</div>
    <div class="time" id="tm">جاري التحديث...</div>
  </div>
  <script>
    const API = "https://script.google.com/macros/s/AKfycbyULn8ehV4cf4mjNaJtltCI24AqhxZ7NPZ-yGd1GQLj_eqESM2wuM5HzUR09-01yqqP/exec";
    function update() {
      fetch(API).then(res => res.json()).then(data => {
        document.getElementById('val').innerText = Number(data.value).toLocaleString() + " $";
        document.getElementById('tm').innerText = "آخر تحديث: " + data.time;
      }).catch(e => document.getElementById('tm').innerText = "خطأ في الاتصال");
    }
    update();
    setInterval(update, 15000);
  </script>
</body>
</html>
